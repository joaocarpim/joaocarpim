
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="100%">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#02050d"/>
      <stop offset="50%"  stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#02050d"/>
    </linearGradient>
    <radialGradient id="fglow_center" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d2a4a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#02050d"  stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fgold_h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e6b450" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e6b450" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e6b450" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fblue_h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#63b3ed" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#63b3ed" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#4299e1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4299e1" stop-opacity="0"/>
    </linearGradient>
    <filter id="fglow_s">
      <feGaussianBlur stdDeviation="2"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow_m">
      <feGaussianBlur stdDeviation="5"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow_xl">
      <feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .fts { animation: ftwinkle var(--d,4s) ease-in-out infinite var(--delay,0s); }
      @keyframes ftwinkle {
        0%,100% { opacity: var(--lo,0.1); }
        50%     { opacity: var(--hi,0.9); }
      }
      .fcn { animation: fcnpulse var(--d,3s) ease-in-out infinite var(--delay,0s); }
      @keyframes fcnpulse {
        0%,100% { opacity:0.2; }
        50%     { opacity:1.0; }
      }
      .fgs { animation: fgspulse var(--d,4s) ease-in-out infinite var(--delay,0s); }
      @keyframes fgspulse {
        0%,100% { opacity:0.3; }
        50%     { opacity:1.0; }
      }
      /* lines breathe — reversed timing vs header */
      .fcl1 { animation: fclb 5s ease-in-out infinite 4s; }
      .fcl2 { animation: fclb 5s ease-in-out infinite 3s; }
      .fcl3 { animation: fclb 5s ease-in-out infinite 2s; }
      .fcl4 { animation: fclb 5s ease-in-out infinite 1s; }
      .fcl5 { animation: fclb 5s ease-in-out infinite 0s; }
      @keyframes fclb {
        0%,100% { opacity:0.08; }
        50%     { opacity:0.45; }
      }
      /* shooting stars come from right in footer */
      .fshot1 { animation: fshoot1 9s linear infinite 3s; }
      .fshot2 { animation: fshoot2 9s linear infinite 7s; }
      @keyframes fshoot1 {
        0%   { transform:translate(0,0);         opacity:0; }
        2%   { opacity:0.9; }
        12%  { transform:translate(-300px,60px); opacity:0; }
        100% { transform:translate(-300px,60px); opacity:0; }
      }
      @keyframes fshoot2 {
        0%   { transform:translate(0,0);        opacity:0; }
        2%   { opacity:0.7; }
        12%  { transform:translate(260px,55px); opacity:0; }
        100% { transform:translate(260px,55px); opacity:0; }
      }
      .fneb { animation: fnebpulse 9s ease-in-out infinite 4.5s; }
      @keyframes fnebpulse {
        0%,100% { opacity:0.04; }
        50%     { opacity:0.12; }
      }
      .fghl { animation: fghpulse 6s ease-in-out infinite 3s; }
      @keyframes fghpulse {
        0%,100% { opacity:0.6; }
        50%     { opacity:1.0; }
      }
    </style>
  </defs>

  <rect width="1200" height="100" fill="url(#fbg)"/>

  <!-- Nebula -->
  <ellipse class="fneb" cx="600" cy="50" rx="350" ry="44" fill="url(#fglow_center)"/>

  <!-- BG stars -->
  <circle class="fts" style="--d:4.1s;--delay:0.3s;--lo:0.08;--hi:0.7" cx="22"   cy="18"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:3.3s;--delay:1.1s;--lo:0.05;--hi:0.6" cx="80"   cy="72"  r="0.8" fill="white"/>
  <circle class="fts" style="--d:5.0s;--delay:0.6s;--lo:0.09;--hi:0.8" cx="140"  cy="30"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:2.8s;--delay:2.2s;--lo:0.06;--hi:0.7" cx="175"  cy="82"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:4.5s;--delay:0.4s;--lo:0.08;--hi:0.9" cx="230"  cy="12"  r="0.8" fill="white"/>
  <circle class="fts" style="--d:3.7s;--delay:1.8s;--lo:0.05;--hi:0.5" cx="280"  cy="68"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:5.2s;--delay:0.9s;--lo:0.07;--hi:0.8" cx="340"  cy="88"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:3.0s;--delay:2.5s;--lo:0.09;--hi:0.6" cx="390"  cy="22"  r="0.9" fill="white"/>
  <circle class="fts" style="--d:4.8s;--delay:0.2s;--lo:0.06;--hi:0.7" cx="440"  cy="78"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:3.5s;--delay:1.5s;--lo:0.08;--hi:0.9" cx="490"  cy="15"  r="0.8" fill="white"/>
  <circle class="fts" style="--d:2.6s;--delay:3.0s;--lo:0.05;--hi:0.6" cx="550"  cy="85"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:4.3s;--delay:0.7s;--lo:0.09;--hi:0.8" cx="620"  cy="20"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:3.8s;--delay:2.0s;--lo:0.07;--hi:0.7" cx="670"  cy="80"  r="0.8" fill="white"/>
  <circle class="fts" style="--d:5.4s;--delay:0.5s;--lo:0.06;--hi:0.5" cx="730"  cy="25"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:2.9s;--delay:1.3s;--lo:0.08;--hi:0.9" cx="780"  cy="75"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:4.6s;--delay:2.7s;--lo:0.05;--hi:0.7" cx="830"  cy="18"  r="0.9" fill="white"/>
  <circle class="fts" style="--d:3.2s;--delay:0.8s;--lo:0.09;--hi:0.8" cx="890"  cy="85"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:5.1s;--delay:1.6s;--lo:0.07;--hi:0.6" cx="940"  cy="30"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:3.6s;--delay:0.1s;--lo:0.08;--hi:0.9" cx="1000" cy="72"  r="0.8" fill="white"/>
  <circle class="fts" style="--d:4.4s;--delay:2.3s;--lo:0.06;--hi:0.5" cx="1055" cy="20"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:2.7s;--delay:1.0s;--lo:0.09;--hi:0.8" cx="1100" cy="78"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:4.9s;--delay:0.4s;--lo:0.07;--hi:0.7" cx="1155" cy="35"  r="0.8" fill="white"/>
  <circle class="fts" style="--d:3.4s;--delay:1.9s;--lo:0.05;--hi:0.6" cx="1185" cy="88"  r="0.6" fill="white"/>
  <!-- extra -->
  <circle class="fts" style="--d:4.0s;--delay:0.6s;--lo:0.08;--hi:0.7" cx="50"   cy="50"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:3.1s;--delay:2.8s;--lo:0.06;--hi:0.5" cx="310"  cy="45"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:5.3s;--delay:1.4s;--lo:0.07;--hi:0.8" cx="510"  cy="50"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:3.9s;--delay:0.3s;--lo:0.09;--hi:0.9" cx="690"  cy="50"  r="0.7" fill="white"/>
  <circle class="fts" style="--d:4.7s;--delay:2.1s;--lo:0.06;--hi:0.6" cx="860"  cy="50"  r="0.6" fill="white"/>
  <circle class="fts" style="--d:2.5s;--delay:1.2s;--lo:0.08;--hi:0.8" cx="1030" cy="50"  r="0.7" fill="white"/>

  <!-- CONSTELLATION LINES — mirrored/different pattern from header -->
  <line class="fcl1" x1="72"   cy="0" x1="72"  y1="28"  x2="180" y2="48"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl2" x1="180"  y1="48"  x2="295" y2="22"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl2" x1="295"  y1="22"  x2="410" y2="58"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl3" x1="410"  y1="58"  x2="510" y2="32"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl3" x1="510"  y1="32"  x2="600" y2="50"  stroke="#e6b450" stroke-width="0.8"/>
  <line class="fcl4" x1="600"  y1="50"  x2="690" y2="28"  stroke="#e6b450" stroke-width="0.8"/>
  <line class="fcl3" x1="690"  y1="28"  x2="790" y2="62"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl2" x1="790"  y1="62"  x2="905" y2="22"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl1" x1="905"  y1="22"  x2="1010" y2="48" stroke="#63b3ed" stroke-width="0.7"/>
  <line class="fcl1" x1="1010" y1="48"  x2="1115" y2="30" stroke="#63b3ed" stroke-width="0.7"/>
  <!-- lower links -->
  <line class="fcl5" x1="180"  y1="48"  x2="295" y2="22"  stroke="#4299e1" stroke-width="0.5"/>
  <line class="fcl5" x1="510"  y1="32"  x2="690" y2="28"  stroke="#4299e1" stroke-width="0.5"/>
  <line class="fcl5" x1="790"  y1="62"  x2="1010" y2="48" stroke="#4299e1" stroke-width="0.5"/>
  <!-- lower constellation different positions -->
  <line class="fcl2" x1="120"  y1="78"  x2="250" y2="68"  stroke="#63b3ed" stroke-width="0.6"/>
  <line class="fcl3" x1="250"  y1="68"  x2="380" y2="82"  stroke="#63b3ed" stroke-width="0.6"/>
  <line class="fcl3" x1="820"  y1="78"  x2="960" y2="68"  stroke="#63b3ed" stroke-width="0.6"/>
  <line class="fcl2" x1="960"  y1="68"  x2="1080" y2="82" stroke="#63b3ed" stroke-width="0.6"/>

  <!-- CONSTELLATION NODES -->
  <circle class="fcn" style="--d:3.1s;--delay:2.5s" cx="72"   cy="28"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:2.9s;--delay:2.0s" cx="180"  cy="48"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.6s;--delay:1.5s" cx="295"  cy="22"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:2.7s;--delay:1.0s" cx="410"  cy="58"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.8s;--delay:0.5s" cx="510"  cy="32"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.3s;--delay:0.0s" cx="690"  cy="28"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:2.8s;--delay:0.8s" cx="790"  cy="62"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.5s;--delay:1.3s" cx="905"  cy="22"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:2.6s;--delay:1.8s" cx="1010" cy="48"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.9s;--delay:2.3s" cx="1115" cy="30"  r="2"   fill="#63b3ed" filter="url(#fglow_s)"/>
  <!-- lower -->
  <circle class="fcn" style="--d:4.1s;--delay:0.4s" cx="120"  cy="78"  r="1.5" fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.4s;--delay:1.6s" cx="250"  cy="68"  r="1.5" fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:2.5s;--delay:2.8s" cx="380"  cy="82"  r="1.5" fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:4.3s;--delay:0.2s" cx="820"  cy="78"  r="1.5" fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.0s;--delay:1.1s" cx="960"  cy="68"  r="1.5" fill="#63b3ed" filter="url(#fglow_s)"/>
  <circle class="fcn" style="--d:3.7s;--delay:2.2s" cx="1080" cy="82"  r="1.5" fill="#63b3ed" filter="url(#fglow_s)"/>

  <!-- GOLD NODES -->
  <circle class="fgs" style="--d:4.0s;--delay:2.0s" cx="600"  cy="50"  r="4"   fill="#e6b450" filter="url(#fglow_m)"/>
  <circle class="fgs" style="--d:5.0s;--delay:0.5s" cx="600"  cy="50"  r="12"  fill="#e6b450" opacity="0.05" filter="url(#fglow_xl)"/>
  <circle class="fgs" style="--d:3.5s;--delay:1.0s" cx="295"  cy="22"  r="2.8" fill="#e6b450" filter="url(#fglow_s)"/>
  <circle class="fgs" style="--d:4.5s;--delay:0.3s" cx="905"  cy="22"  r="2.8" fill="#e6b450" filter="url(#fglow_s)"/>
  <circle class="fgs" style="--d:3.8s;--delay:1.8s" cx="72"   cy="28"  r="2.2" fill="#e6b450" opacity="0.7" filter="url(#fglow_s)"/>
  <circle class="fgs" style="--d:4.2s;--delay:2.5s" cx="1115" cy="30"  r="2.2" fill="#e6b450" opacity="0.7" filter="url(#fglow_s)"/>

  <!-- SHOOTING STARS reversed direction -->
  <g class="fshot1">
    <line x1="900" y1="65" x2="960" y2="82" stroke="white" stroke-width="1.2" opacity="0.9" stroke-linecap="round"/>
    <circle cx="900" cy="65" r="1.5" fill="white" opacity="0.9"/>
  </g>
  <g class="fshot2">
    <line x1="280" y1="70" x2="220" y2="85" stroke="white" stroke-width="1.2" opacity="0.8" stroke-linecap="round"/>
    <circle cx="280" cy="70" r="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- Top gold accent line -->
  <line class="fghl" x1="0" y1="2" x2="1200" y2="2" stroke="url(#fgold_h)" stroke-width="1.5"/>
  <line x1="0" y1="5" x2="1200" y2="5" stroke="url(#fblue_h)" stroke-width="0.6" opacity="0.3"/>
</svg>
