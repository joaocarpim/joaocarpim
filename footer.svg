<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="100%">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04080f"/>
      <stop offset="50%"  stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>
    <linearGradient id="fline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#63b3ed" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#63b3ed" stop-opacity="0.6"/>
      <stop offset="70%"  stop-color="#4299e1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4299e1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e6b450" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e6b450" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e6b450" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ftriL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#1a3a5c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ftriR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#1a3a5c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="fglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow2">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow3">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      /* diamonds — all reversed vs header */
      .fdo { animation: fspinR 28s linear infinite; transform-origin: 600px 50px; }
      .fdm { animation: fspinL 18s linear infinite; transform-origin: 600px 50px; }
      .fdi { animation: fspinR 10s linear infinite; transform-origin: 600px 50px; }
      @keyframes fspinR { to { transform: rotate( 360deg); } }
      @keyframes fspinL { to { transform: rotate(-360deg); } }

      /* side diamonds — opposite to header */
      .fsdL { animation: forbitL 12s ease-in-out infinite 6s; transform-origin: 200px 50px; }
      .fsdR { animation: forbitR 12s ease-in-out infinite 6s; transform-origin: 1000px 50px; }
      @keyframes forbitL {
        0%,100% { transform: translateY(0px);  opacity: 0.5; }
        50%     { transform: translateY(14px);  opacity: 1.0; }
      }
      @keyframes forbitR {
        0%,100% { transform: translateY(0px);  opacity: 0.5; }
        50%     { transform: translateY(-14px); opacity: 1.0; }
      }

      /* nodes — reversed cascade */
      .fn1 { animation: fpulse 3.0s ease-in-out infinite 2.5s; }
      .fn2 { animation: fpulse 3.0s ease-in-out infinite 2.0s; }
      .fn3 { animation: fpulse 3.0s ease-in-out infinite 1.5s; }
      .fn4 { animation: fpulse 3.0s ease-in-out infinite 1.0s; }
      .fn5 { animation: fpulse 3.0s ease-in-out infinite 0.5s; }
      .fn6 { animation: fpulse 3.0s ease-in-out infinite 0.0s; }
      @keyframes fpulse {
        0%,100% { opacity: 0.15; }
        50%     { opacity: 1.00; }
      }

      /* gold bottom node */
      .fgc { animation: fgoldpulse 3.5s ease-in-out infinite 1.75s; }
      @keyframes fgoldpulse {
        0%,100% { opacity: 0.3; }
        50%     { opacity: 1.0; }
      }

      /* connecting lines breathe */
      .fcb  { animation: fconnb 5s ease-in-out infinite 2.5s; }
      .fcb2 { animation: fconnb 5s ease-in-out infinite 0.0s; }
      @keyframes fconnb {
        0%,100% { opacity: 0.2; }
        50%     { opacity: 0.7; }
      }

      /* triangle fills pulse */
      .ftrL { animation: ftrpL 6s ease-in-out infinite 3s; }
      .ftrR { animation: ftrpR 6s ease-in-out infinite 0s; }
      @keyframes ftrpL { 0%,100%{opacity:0.15;} 50%{opacity:0.45;} }
      @keyframes ftrpR { 0%,100%{opacity:0.15;} 50%{opacity:0.45;} }

      /* outer ring breathe */
      .fring { animation: fringp 7s ease-in-out infinite 3.5s; }
      @keyframes fringp {
        0%,100% { opacity: 0.08; }
        50%     { opacity: 0.20; }
      }

      /* floating particles — rise upward in footer */
      .fp1 { animation: ffloat1 8s  ease-in-out infinite 0.5s; }
      .fp2 { animation: ffloat2 11s ease-in-out infinite 2.0s; }
      .fp3 { animation: ffloat3 9s  ease-in-out infinite 4.0s; }
      .fp4 { animation: ffloat4 13s ease-in-out infinite 1.0s; }
      .fp5 { animation: ffloat5 7s  ease-in-out infinite 3.5s; }

      @keyframes ffloat1 {
        0%,100%{ transform:translate(0,0);       opacity:0; }
        20%    { opacity:0.8; }
        80%    { opacity:0.4; }
        100%   { transform:translate(-35px,50px); opacity:0; }
      }
      @keyframes ffloat2 {
        0%,100%{ transform:translate(0,0);      opacity:0; }
        20%    { opacity:0.6; }
        80%    { opacity:0.3; }
        100%   { transform:translate(40px,45px); opacity:0; }
      }
      @keyframes ffloat3 {
        0%,100%{ transform:translate(0,0);       opacity:0; }
        25%    { opacity:0.9; }
        75%    { opacity:0.5; }
        100%   { transform:translate(25px,55px);  opacity:0; }
      }
      @keyframes ffloat4 {
        0%,100%{ transform:translate(0,0);        opacity:0; }
        20%    { opacity:0.7; }
        80%    { opacity:0.3; }
        100%   { transform:translate(-28px,40px);  opacity:0; }
      }
      @keyframes ffloat5 {
        0%,100%{ transform:translate(0,0);      opacity:0; }
        30%    { opacity:1.0; }
        70%    { opacity:0.5; }
        100%   { transform:translate(38px,50px); opacity:0; }
      }
    </style>
  </defs>

  <rect width="1200" height="100" fill="url(#fbg)"/>

  <!-- Grid -->
  <line x1="0" y1="25"  x2="1200" y2="25"  stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="0" y1="50"  x2="1200" y2="50"  stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="0" y1="75"  x2="1200" y2="75"  stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="200"  y1="0" x2="200"  y2="100" stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="400"  y1="0" x2="400"  y2="100" stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="600"  y1="0" x2="600"  y2="100" stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="800"  y1="0" x2="800"  y2="100" stroke="#0c1e35" stroke-width="0.5"/>
  <line x1="1000" y1="0" x2="1000" y2="100" stroke="#0c1e35" stroke-width="0.5"/>

  <!-- Triangle fills -->
  <polygon class="ftrL" points="0,100 300,100 0,0" fill="url(#ftriL)"/>
  <polygon class="ftrR" points="1200,100 900,100 1200,0" fill="url(#ftriR)"/>

  <!-- Diagonals (inverted — top to bottom) -->
  <line x1="0"    y1="0"   x2="200"  y2="100" stroke="#1a3a5c" stroke-width="1.2" opacity="0.7"/>
  <line x1="50"   y1="0"   x2="250"  y2="100" stroke="#1a3a5c" stroke-width="0.7" opacity="0.5"/>
  <line x1="100"  y1="0"   x2="300"  y2="100" stroke="#0f2a45" stroke-width="0.5" opacity="0.35"/>
  <line x1="1200" y1="0"   x2="1000" y2="100" stroke="#1a3a5c" stroke-width="1.2" opacity="0.7"/>
  <line x1="1150" y1="0"   x2="950"  y2="100" stroke="#1a3a5c" stroke-width="0.7" opacity="0.5"/>
  <line x1="1100" y1="0"   x2="900"  y2="100" stroke="#0f2a45" stroke-width="0.5" opacity="0.35"/>

  <!-- Connecting lines breathe top -->
  <line class="fcb"  x1="200" y1="50" x2="400"  y2="25"  stroke="#63b3ed" stroke-width="0.9"/>
  <line class="fcb"  x1="400" y1="25" x2="600"  y2="10"  stroke="#63b3ed" stroke-width="0.8"/>
  <line class="fcb"  x1="600" y1="10" x2="800"  y2="25"  stroke="#63b3ed" stroke-width="0.8"/>
  <line class="fcb"  x1="800" y1="25" x2="1000" y2="50"  stroke="#63b3ed" stroke-width="0.9"/>
  <!-- bottom -->
  <line class="fcb2" x1="200" y1="50" x2="400"  y2="75"  stroke="#63b3ed" stroke-width="0.9"/>
  <line class="fcb2" x1="400" y1="75" x2="600"  y2="90"  stroke="#63b3ed" stroke-width="0.8"/>
  <line class="fcb2" x1="600" y1="90" x2="800"  y2="75"  stroke="#63b3ed" stroke-width="0.8"/>
  <line class="fcb2" x1="800" y1="75" x2="1000" y2="50"  stroke="#63b3ed" stroke-width="0.9"/>

  <!-- Outer ring -->
  <circle class="fring" cx="600" cy="50" r="34" fill="none" stroke="#63b3ed" stroke-width="0.8"/>

  <!-- Side diamonds floating -->
  <g class="fsdL">
    <polygon points="200,37 213,50 200,63 187,50" fill="none" stroke="#63b3ed" stroke-width="1" opacity="0.7" filter="url(#fglow)"/>
  </g>
  <g class="fsdR">
    <polygon points="1000,37 1013,50 1000,63 987,50" fill="none" stroke="#63b3ed" stroke-width="1" opacity="0.7" filter="url(#fglow)"/>
  </g>

  <!-- Rotating diamonds -->
  <polygon class="fdo" points="600,10 636,50 600,90 564,50"
    fill="none" stroke="#1e3a5c" stroke-width="1.1" opacity="0.5"/>
  <polygon class="fdm" points="600,22 622,50 600,78 578,50"
    fill="none" stroke="#2a5280" stroke-width="0.9" opacity="0.35" filter="url(#fglow)"/>
  <polygon class="fdi" points="600,32 617,50 600,68 583,50"
    fill="none" stroke="#63b3ed" stroke-width="0.8" opacity="0.28" filter="url(#fglow)"/>

  <!-- Floating particles (drift down in footer) -->
  <circle class="fp1" cx="460" cy="30" r="1.5" fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fp2" cx="720" cy="20" r="1.5" fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fp3" cx="540" cy="15" r="1.2" fill="#e6b450" filter="url(#fglow)"/>
  <circle class="fp4" cx="340" cy="35" r="1.2" fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fp5" cx="860" cy="22" r="1.5" fill="#63b3ed" filter="url(#fglow)"/>

  <!-- Glow center line -->
  <line x1="0" y1="50" x2="1200" y2="50" stroke="url(#fline)" stroke-width="1.5"/>
  <!-- Gold top border -->
  <line x1="0" y1="2"  x2="1200" y2="2"  stroke="url(#fgold)" stroke-width="1.5"/>

  <!-- Pulsing nodes -->
  <circle class="fn1" cx="200"  cy="50"  r="3"   fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fn2" cx="400"  cy="25"  r="3"   fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fn3" cx="600"  cy="50"  r="3"   fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fn4" cx="800"  cy="25"  r="3"   fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fn5" cx="1000" cy="50"  r="3"   fill="#63b3ed" filter="url(#fglow)"/>
  <circle class="fn6" cx="600"  cy="10"  r="2.5" fill="#63b3ed" filter="url(#fglow)"/>

  <!-- Gold bottom node -->
  <circle class="fgc" cx="600" cy="90" r="4.5" fill="#e6b450" filter="url(#fglow2)"/>
  <circle class="fgc" cx="600" cy="90" r="12"  fill="#e6b450" opacity="0.06" filter="url(#fglow3)"/>
</svg>
